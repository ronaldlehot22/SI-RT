name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to Shared Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP (exclude vendor)
        run: |
          lftp -c "
          set ftp:ssl-allow yes;
          set ssl:verify-certificate no;
          set ftp:passive-mode yes;
          set net:timeout 60;
          set net:max-retries 3;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:21;
          mirror --reverse --delete --verbose --use-cache --size-only \
            --exclude='^\.git' \
            --exclude='^node_modules/' \
            --exclude='^vendor/' \
            --exclude='^\.env$' \
            --exclude='^\.env\.example$' \
            --exclude='^tests/' \
            --exclude='^phpunit\.xml' \
            --exclude='^database/database\.sqlite' \
            . ${{ secrets.FTP_SERVER_DIR }};
          quit;
          "

      - name: Run post-deploy commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_DIR }}
            cat > .env << 'EOF'
            APP_NAME="${{ secrets.APP_NAME }}"
            APP_ENV=production
            APP_KEY=
            APP_DEBUG=false
            APP_URL=${{ secrets.APP_URL }}

            DB_CONNECTION=mysql
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            CACHE_STORE=database
            SESSION_DRIVER=database
            QUEUE_CONNECTION=database
            EOF
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --ignore-platform-req=php
            php artisan key:generate --force
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            ln -sfn ${{ secrets.SSH_DIR }}/storage/app/public ${{ secrets.SSH_DIR }}/public/storage
