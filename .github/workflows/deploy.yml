name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to Shared Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Get changed files
        id: changed
        run: |
          git fetch --depth=2
          echo "files=$(git diff --name-only HEAD~1 HEAD | grep -v '^vendor/' | grep -v '^node_modules/' | grep -v '^\.env' | grep -v '^tests/' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Deploy changed files via FTP
        run: |
          CHANGED="${{ steps.changed.outputs.files }}"
          if [ -z "$CHANGED" ]; then
            echo "No changed files to deploy"
            exit 0
          fi
          echo "Deploying: $CHANGED"
          lftp -c "
          set ftp:ssl-allow yes;
          set ssl:verify-certificate no;
          set ftp:passive-mode yes;
          set net:timeout 60;
          set net:max-retries 3;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:21;
          $(for f in $CHANGED; do
            dir=$(dirname $f)
            if [ \"$dir\" != \".\" ]; then
              echo "mkdir -p ${{ secrets.FTP_SERVER_DIR }}$dir;"
            fi
            echo "put $f -o ${{ secrets.FTP_SERVER_DIR }}$f;"
          done)
          quit;
          "

      - name: Run post-deploy commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_DIR }}
            cat > .env << 'EOF'
            APP_NAME="${{ secrets.APP_NAME }}"
            APP_ENV=production
            APP_KEY=
            APP_DEBUG=false
            APP_URL=${{ secrets.APP_URL }}

            DB_CONNECTION=mysql
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            CACHE_STORE=database
            SESSION_DRIVER=database
            QUEUE_CONNECTION=database
            EOF
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --ignore-platform-req=php
            php artisan key:generate --force
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear
            php artisan event:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            ln -sfn ${{ secrets.SSH_DIR }}/storage/app/public ${{ secrets.SSH_DIR }}/public/storage
